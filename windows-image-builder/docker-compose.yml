version: '3.8'

services:
  cave-windows-builder:
  
    # Use pre-built image from GitHub Container Registry
    # main tag points to the latest commit on the main branch
    # Recommended to use latest tag or specify a version if available
    image: ghcr.io/felixhertweck/cave-windows-image-builder:main

    container_name: cave-windows-builder

    ports:
      # noVNC port mapping. Access via http://localhost:8080/vnc.html
      - "8080:8080"

    environment:
      # Choose variant: client, server2025, server/server2022
      - VARIANT=${VARIANT:-client}

      # Choose Windows image index for server variants (default: 4 = Datacenter Desktop)
      # Only used when VARIANT=server2025
      - IMAGE_INDEX=${IMAGE_INDEX:-4}

      # Optionally disable --new-disk flag for bootstrap.sh if needed
      # - DISABLE_NEW_DISK=true

    volumes:
      # Mount ISO images
      - ./iso-images:/work/iso-images:ro

      # Output directory for the final qcow2 image
      - ./output:/work/output

    devices:
      - /dev/kvm:/dev/kvm

    cap_add:
      - NET_ADMIN

    # privileged is often required for QEMU/KVM inside docker
    privileged: true
