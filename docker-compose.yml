services:
  # DinD is needed for building the cave images
  dind:
    image: docker:dind
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=
    volumes:
      - dind-data:/var/lib/docker
    network_mode: host

  cave:
    # Use pre-built image from GitHub Container Registry
    # main tag points to the latest commit on the main branch
    # Recommended to use latest tag or specify a version if available
    image: ghcr.io/felixhertweck/cave-infrastructure-docker:main

    # Load environment variables from .env file
    env_file: .env

    # Keep container running
    stdin_open: true
    tty: true

    # Capabilities for WireGuard (if needed)
    cap_add:
      - NET_ADMIN

    depends_on:
      - dind

    environment:
      # Use the Docker daemon provided by the DinD service.
      - DOCKER_HOST=tcp://127.0.0.1:2375

    # Mount volumes for configuration and SSH keys
    volumes:
      # OpenStack RC file (optional, used if present; credentials can also come from .env)
      - ./.openrc:/.openrc:ro

      # SSH keys for deployment
      - ./ssh-keys:/home/cave/.ssh:ro

      # Configuration files
      - ./backend/configs:/cave/backend/configs:ro

      # Output directory for generated infrastructure
      - ./out:/cave/out:rw

    network_mode: host

volumes:
  dind-data:
