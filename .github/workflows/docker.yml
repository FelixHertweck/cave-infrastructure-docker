name: Build and Push Docker Image

on:
  workflow_call:
    inputs:
      container_name:
        description: "Name of the container image (without registry prefix)"
        required: true
        type: string
      context:
        description: "Build context path (relative to repo root)"
        required: true
        type: string
        default: "."
      dockerfile:
        description: "Path to Dockerfile (relative to context)"
        required: true
        type: string
        default: "Dockerfile"
      platforms:
        description: "Target platforms for build (comma-separated)"
        required: false
        type: string
        default: "linux/amd64,linux/arm64"

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build & Push - ${{ inputs.container_name }}
    runs-on: "ubuntu-24.04"
    timeout-minutes: 30

    env:
      REGISTRY: ghcr.io

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install cosign
        if: ${{ github.event_name != 'pull_request' }}
        uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: "v2.4.3"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          # Enable docker-container driver for better caching
          driver-options: |
            image=moby/buildkit:master

      - name: Log into registry ${{ env.REGISTRY }}
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ inputs.container_name }}
          labels: |
            org.opencontainers.image.title=${{ inputs.container_name }}
            org.opencontainers.image.authors=Felix Hertweck

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          # For PRs, only build for current platform (faster feedback)
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || inputs.platforms }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          context: ${{ inputs.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # BuildKit inline cache for faster subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build arguments
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}